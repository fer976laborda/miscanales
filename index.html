<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Canales - Fernando</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      background-color: #0d0d0d;
      color: #f1c40f;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 24px 16px 48px;
    }

    h1 {
      margin: 0 0 24px;
      font-size: 2rem;
      text-align: center;
    }

    .intro {
      text-align: center;
      max-width: 900px;
      margin: 0 auto 28px;
      color: #f8df6f;
    }

    .canales {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 24px;
    }

    .canal {
      background-color: #181818;
      border: 1px solid #f1c40f55;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 0 14px #00000055;
    }

    .canal h2 {
      margin: 0 0 14px;
      font-size: 1.4rem;
    }

    .boton-canal {
      display: inline-block;
      background-color: #1a1a1a;
      border: 2px solid #f1c40f;
      color: #f1c40f;
      padding: 10px 18px;
      margin-bottom: 18px;
      font-size: 0.95rem;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.25s ease-in-out;
    }

    .boton-canal:hover {
      background-color: #f1c40f;
      color: #0d0d0d;
      transform: translateY(-1px);
    }

    .videos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .video {
      margin: 0;
      background: #111;
      border: 1px solid #f1c40f33;
      border-radius: 10px;
      overflow: hidden;
    }

    .video h3 {
      font-size: 0.95rem;
      line-height: 1.35;
      margin: 10px 10px 0;
      color: #ffe79a;
      min-height: 2.6em;
    }

    .video iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>🎬 Mis canales y vídeos destacados</h1>
  <p class="intro">Aquí puedes entrar a cada canal y ver 3 vídeos recomendados de cada uno, todo en una sola página.</p>

        </figure>
        <figure class="video">
          <h3>Receta de pestiños fácil (Semana Santa/Navidad)</h3>

        </figure>
        <figure class="video">

        </figure>

    <section class="canal" id="edita-disena">

      <div class="videos">
        <figure class="video">

        <figure class="video">

          <iframe src="https://www.youtube.com/embed/WZuT44F_g3Q" title="Activar corrector en LibreOffice" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>

    </section>
  </main>
</body>
</html>
